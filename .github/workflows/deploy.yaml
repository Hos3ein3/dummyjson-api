name: DummyJson API CI-CD

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /wwwroot/dummyjson/api

jobs:
  deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ env.OWNER_LC }}/dummyjson-api:latest -f Dockerfile .

      - name: Push Docker image
        run: docker push ghcr.io/${{ env.OWNER_LC }}/dummyjson-api:latest

      - name: Ensure deploy folder exists
        run: sudo mkdir -p "$DEPLOY_PATH"

      - name: Copy docker-compose
        run: sudo cp docker-compose.yml "$DEPLOY_PATH/docker-compose.yml"

      - name: Copy .env
        run: |
          sudo cp .env "$DEPLOY_PATH/.env"
          sudo sed -i "s/^GITHUB_REPOSITORY_OWNER=.*/GITHUB_REPOSITORY_OWNER=${{ env.OWNER_LC }}/" "$DEPLOY_PATH/.env"

      - name: Copy API wwwroot
        run: |
          if [ -d "src/DummyJson.API/wwwroot" ]; then
            sudo rm -rf "$DEPLOY_PATH/wwwroot"
            sudo cp -r src/DummyJson.API/wwwroot "$DEPLOY_PATH/wwwroot"
          fi

      - name: Pull latest image
        run: docker pull ghcr.io/${{ env.OWNER_LC }}/dummyjson-api:latest

      - name: Run docker compose
        run: |
          cd "$DEPLOY_PATH"
          docker compose up -d

      - name: Cleanup images
        run: docker image prune -f