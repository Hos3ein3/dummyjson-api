name: DummyJson API Deploy

on:
  push:
    branches: [main]

env:
  DEPLOY_PATH: /wwwroot/dummyjson/api

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Ensure api folder exists
        run: |
          sudo mkdir -p "$DEPLOY_PATH"

      - name: Restore API
        run: |
          dotnet restore ./src/DummyJson.API/DummyJson.API.csproj

      - name: Build API
        run: |
          dotnet build ./src/DummyJson.API/DummyJson.API.csproj -c Release --no-restore

      - name: Clean api folder except env and compose
        run: |
          sudo find "$DEPLOY_PATH" -mindepth 1 \
            ! -name '.env' \
            ! -name 'docker-compose.yml' \
            -exec rm -rf {} +

      - name: Publish directly into api root
        run: |
          sudo dotnet publish ./src/DummyJson.API/DummyJson.API.csproj \
            -c Release \
            -o "$DEPLOY_PATH" \
            --no-build

      - name: Copy docker-compose
        run: |
          sudo cp docker-compose.yml "$DEPLOY_PATH/docker-compose.yml"

      - name: Copy .env
        run: |
          sudo cp .env "$DEPLOY_PATH/.env"

      - name: Run docker compose
        run: |
          cd "$DEPLOY_PATH"
          docker compose up -d

      - name: Show deployed files
        run: |
          ls -la "$DEPLOY_PATH"