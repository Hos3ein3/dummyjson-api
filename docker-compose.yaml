services:
  dummyjson-api:
    image: mcr.microsoft.com/dotnet/aspnet:9.0
    container_name: dummyjson-api
    restart: unless-stopped
    working_dir: /app
    command: ["dotnet", "DummyJson.API.dll"]
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    volumes:
      - /home/homelabadmin/wwwroot/dummyjson/api:/app
    networks:
      - homelab-docker-network

networks:
  homelab-docker-network:
    external: true